# yaml-language-server: $schema=../../../../../schemas/nexus-rpc-gen.json
nexusrpc: 1.0.0
services:
  WorkflowService:
    operations:
      signalWithStart:
        input:
          $goRef: go.temporal.io/api/workflowservice/v1.SignalWithStartWorkflowExecutionRequest
          $ref: '#/types/GenericInput'
        output:
          $goRef: go.temporal.io/api/workflowservice/v1.SignalWithStartWorkflowExecutionResponse
          $ref: '#/types/GenericOutput'
  OperatorService:
    operations:
      addSearchAttributes:
        input:
          $goRef: go.temporal.io/api/operatorservice/v1.AddSearchAttributesRequest
          $ref: '#/types/GenericInput'
        output:
          $goRef: go.temporal.io/api/operatorservice/v1.AddSearchAttributesResponse
          $ref: '#/types/GenericOutput'
types:
  GenericInput:
    type: object
    additionalProperties: false
  GenericOutput:
    type: object
    additionalProperties: false
