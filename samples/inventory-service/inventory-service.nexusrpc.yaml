# yaml-language-server: $schema=../../schemas/nexus-rpc-gen.json
nexusrpc: 1.0.0

services:
  InventoryService:
    description: >-
      An inventory tracking service that demonstrates using $langRef to
      reference types that already exist in your target language instead of
      generating new ones.
    operations:
      addItem:
        description: Add a new item to the inventory.
        input:
          $goRef: github.com/example/inventory/types.AddItemInput
          $javaRef: com.example.inventory.AddItemInput
          $pythonRef: inventory.types.AddItemInput
          $csharpRef: Example.Inventory.AddItemInput
          $typescriptRef: ./types.js#AddItemInput
        output:
          $goRef: github.com/example/inventory/types.AddItemOutput
          $javaRef: com.example.inventory.AddItemOutput
          $pythonRef: inventory.types.AddItemOutput
          $csharpRef: Example.Inventory.AddItemOutput
          $typescriptRef: ./types.js#AddItemOutput

      getItemStock:
        description: Get current stock levels for an item.
        input:
          $ref: '#/types/GetItemStockInput'
        output:
          $goRef: github.com/example/inventory/types.GetItemStockOutput
          $javaRef: com.example.inventory.GetItemStockOutput
          $pythonRef: inventory.types.GetItemStockOutput
          $csharpRef: Example.Inventory.GetItemStockOutput
          $typescriptRef: ./types.js#GetItemStockOutput

      reserveStock:
        description: Reserve stock for a pending order.
        input:
          # Use an existing type for Go and Java; other languages will fall
          # back to the generated type from $ref.
          $goRef: github.com/example/inventory/types.ReservationInput
          $javaRef: com.example.inventory.ReservationInput
          $ref: '#/types/ReserveStockInput'
        output:
          $goRef: github.com/example/inventory/types.ReservationOutput
          $javaRef: com.example.inventory.ReservationOutput
          $ref: '#/types/ReserveStockOutput'

types:
  GetItemStockInput:
    type: object
    additionalProperties: false
    properties:
      sku:
        description: The SKU to look up.
        type: string
    required: [sku]

  ReserveStockInput:
    type: object
    additionalProperties: false
    properties:
      sku:
        description: The SKU to reserve.
        type: string
      quantity:
        description: Number of units to reserve.
        type: integer
      orderId:
        description: The order this reservation is for.
        type: string
    required: [sku, quantity, orderId]

  ReserveStockOutput:
    type: object
    additionalProperties: false
    properties:
      reserved:
        description: Whether the stock was successfully reserved.
        type: boolean
    required: [reserved]
