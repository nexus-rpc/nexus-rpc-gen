name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0-alpha2)"
        required: true
        type: string
      ref:
        description: "Git ref to release from (branch or SHA)"
        required: true
        type: string
        default: "main"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Validate version format
        run: |
          version=${{ inputs.version }}
          # regex from https://semver.org/
          SEMVER_REGEX='^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$'
          if ! echo "$version" | grep -qP $SEMVER_REGEX; then
            echo "::error::Invalid version format: $version (expected semver, e.g. 1.2.3 or 1.2.3-alpha1)"
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi

  prepare-release:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      commit-sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive
          fetch-depth: 0

      - name: Update package versions
        run: |
          version="${{ inputs.version }}"
          for pkg in src/packages/*/package.json; do
            jq --arg v "$version" '.version = $v' "$pkg" > "$pkg.tmp" && mv "$pkg.tmp" "$pkg"
          done

      - name: Configure git
        run: |
          git config --local user.name "${{ github.actor }}"
          git config --local user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - name: Commit version bump
        id: commit
        run: |
          git add src/packages/*/package.json
          if git diff --cached --quiet; then
            echo "Versions already match, skipping commit"
          else
            git commit -m "release: v${{ inputs.version }}"
            git push origin HEAD
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  create-draft-release:
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ inputs.version }}"
          commit_sha="${{ needs.prepare-release.outputs.commit-sha }}"

          prerelease_flag=""
          if echo "$version" | grep -qE -- '-'; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "v${version}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release v${version} already exists, skipping creation"
          else
            gh release create "v${version}" \
              --repo "${{ github.repository }}" \
              --title "v${version}" \
              --target "${commit_sha}" \
              --generate-notes \
              --draft \
              $prerelease_flag
          fi

  build-binaries:
    needs: prepare-release
    uses: ./.github/workflows/build-binary.yml
    with:
      ref: ${{ needs.prepare-release.outputs.commit-sha }}

  upload-artifacts:
    needs: [build-binaries, create-draft-release]
    runs-on: ubuntu-latest
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: nexus-rpc-gen_*
          path: artifacts

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "v${{ inputs.version }}" \
            --repo "${{ github.repository }}" \
            --clobber \
            artifacts/nexus-rpc-gen_linux_x64/*.tar.gz \
            artifacts/nexus-rpc-gen_linux_arm64/*.tar.gz \
            artifacts/nexus-rpc-gen_windows_x64/*.zip \
            artifacts/nexus-rpc-gen_macos_x64/*.tar.gz \
            artifacts/nexus-rpc-gen_macos_arm64/*.tar.gz
